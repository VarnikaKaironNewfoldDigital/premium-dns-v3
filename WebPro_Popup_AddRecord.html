                                    <div>
                                        <form action="#">

                                            <div class="add-new-record-wrap">
                                                <div class="dns-fieldset-wrap">
                                                    <div class="dns-all-input-fields dns-add-new-record">
                                                        <div class="dns-input-field-contracted">
                                                            <div class="dns-field dns-domain"><input
                                                                    name="dnsRecords.0.host" id="dnsRecords.0.host"
                                                                    data-testid="dns-host" type="text"
                                                                    placeholder="DOMAIN/SUB-DOMAIN" value=""><label
                                                                    for="dnsRecords.0.host">DOMAIN/SUB-DOMAIN</label>
                                                            </div>
                                                            <div class="dns-field dns-type"><input
                                                                    name="dnsRecords.0.type" type="text" disabled=""
                                                                    value="A">
                                                                <div class="dns-type-text">IN</div>
                                                            </div>
                                                            <div class="dns-field dns-ip"><input
                                                                    name="dnsRecords.0.value" id="dnsRecords.0.value"
                                                                    data-testid="dns-value" type="text"
                                                                    placeholder="IPv4 ADDRESS*" value=""><label
                                                                    for="dnsRecords.0.value">IPv4 ADDRESS*</label></div>
                                                        </div>
                                                        <div class="dns-input-field-expanded">
                                                            <div class="dns-field dns-ttl-input"><select
                                                                    name="dnsRecords.0.timetolive"
                                                                    placeholder="TTL (Time to Live)">
                                                                    <option value="Choose TTL">Choose TTL</option>
                                                                    <option value="7200">2 hours</option>
                                                                    <option value="14400">4 hours</option>
                                                                    <option value="21600">6 hours</option>
                                                                    <option value="43200">12 hours</option>
                                                                    <option value="86400">1 day</option>
                                                                    <option value="345600">4 days</option>
                                                                    <option value="604800">1 week</option>
                                                                </select><label>TTL (Time to Live)</label></div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="dns-note add-new-record-note">These changes will take 4-6 hours
                                                to come into effect.</div>
                                            <div>
                                                <div><button type="button" class="dns-add-record-button"><span>+</span>
                                                        Add Another Record</button></div>
                                                <div><button type="submit" disabled="" data-testid="add-new-record"
                                                        class="add-record-submit">SAVE RECORD(S)</button></div>
                                            </div>
                                        </form>
                                    </div>
                                </div>

                                                    alt="edit"></button></div>
                                        <div class="dns-delete-wrap"><button data-testid="delete-existing-dns-record"

                                                    src="https://assets.dstack.tech/static/media/del.2bd6d20de63fe92c8f8d3b47fcf00566.svg"
                                                    alt="delete"></button></div>
                                    </div>
                                </div>
                            </form>
